<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Image Histogram — pict-section-histogram Example</title>
		<style id="PICT-CSS"></style>
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				margin: 20px;
				background: #f5f5f5;
				color: #333;
				max-width: 960px;
			}
			h1 { font-size: 24px; margin-bottom: 4px; }
			h1 small { font-size: 14px; color: #888; font-weight: normal; }
			h2 { font-size: 16px; margin-top: 0; margin-bottom: 12px; }
			p.subtitle { font-size: 13px; color: #777; margin-top: 0; margin-bottom: 16px; }

			/* Drop zone */
			#ImageDropZone {
				border: 3px dashed #ccc;
				border-radius: 12px;
				padding: 40px;
				text-align: center;
				color: #999;
				font-size: 16px;
				transition: border-color 0.2s, background-color 0.2s;
				cursor: default;
				margin-bottom: 20px;
			}
			#ImageDropZone.drag-over {
				border-color: #4A90D9;
				background-color: #f0f7ff;
				color: #4A90D9;
			}
			#ImageDropZone .drop-icon {
				font-size: 48px;
				display: block;
				margin-bottom: 8px;
			}
			#ImageDropZone .drop-hint {
				font-size: 12px;
				color: #bbb;
				margin-top: 6px;
			}

			/* Image preview */
			#ImagePreviewArea {
				display: none;
				margin-bottom: 20px;
				padding: 16px;
				background: #fff;
				border: 1px solid #ddd;
				border-radius: 8px;
			}
			#ImagePreview {
				max-width: 300px;
				max-height: 200px;
				border-radius: 4px;
				border: 1px solid #ddd;
			}
			#ImageInfo {
				font-size: 13px;
				color: #777;
				margin-top: 8px;
			}
			#PixelCount {
				font-size: 12px;
				color: #aaa;
			}

			/* Histogram sections */
			#HistogramArea { display: none; }
			.histogram-section {
				background: #fff;
				border: 1px solid #ddd;
				border-radius: 8px;
				padding: 16px;
				margin-bottom: 16px;
			}
		</style>
		<script src="./pict.min.js" type="text/javascript"></script>
		<script type="text/javascript">
			Pict.safeOnDocumentReady(
				() =>
				{
					Pict.safeLoadPictApplication(ImageHistogram, 1);
				});
		</script>
	</head>
	<body>
		<h1>Image Histogram <small>pict-section-histogram Example</small></h1>
		<p class="subtitle">Drop an image to analyze its color channels, hue distribution, and luminosity.</p>

		<!-- Drop Zone -->
		<div id="ImageDropZone">
			<span class="drop-icon">&#x1F4F7;</span>
			Drop an image here
			<div class="drop-hint">Supports JPEG, PNG, GIF, WebP, BMP</div>
		</div>

		<!-- Image Preview -->
		<div id="ImagePreviewArea">
			<img id="ImagePreview" alt="Dropped image preview" />
			<div id="ImageInfo"></div>
			<div id="PixelCount"></div>
		</div>

		<!-- Histogram Area (hidden until image is dropped) -->
		<div id="HistogramArea">
			<div class="histogram-section">
				<h2 style="color: #C0392B;">Red Channel</h2>
				<div id="Histogram-Red-Container"></div>
			</div>

			<div class="histogram-section">
				<h2 style="color: #27AE60;">Green Channel</h2>
				<div id="Histogram-Green-Container"></div>
			</div>

			<div class="histogram-section">
				<h2 style="color: #2980B9;">Blue Channel</h2>
				<div id="Histogram-Blue-Container"></div>
			</div>

			<div class="histogram-section" id="AlphaHistogramSection">
				<h2 style="color: #7F8C8D;">Alpha Channel</h2>
				<div id="Histogram-Alpha-Container"></div>
			</div>

			<div class="histogram-section">
				<h2 style="color: #8E44AD;">Hue Distribution <small style="font-weight:normal;color:#aaa;">(0&ndash;360&deg;)</small></h2>
				<div id="Histogram-Hue-Container"></div>
			</div>

			<div class="histogram-section">
				<h2 style="color: #555;">Luminosity</h2>
				<div id="Histogram-Luminosity-Container"></div>
			</div>
		</div>

		<script src="./image_histogram.min.js" type="text/javascript"></script>
	</body>
</html>
